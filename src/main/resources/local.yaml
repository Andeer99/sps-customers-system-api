# Propiedades para ejecución local.
# El flow carga este archivo cuando mule.env=local.
http:
  # 0.0.0.0 permite que el listener acepte llamadas desde localhost y herramientas como Postman.
  host: "0.0.0.0"
  port: "8081"

api:
  # En local se usa 0 porque Autodiscovery solo se activa con el API Instance ID real.
  id: "0"
  name: "sps-customers-system-api"
  version: "v1"

db:
  # Base de entrenamiento indicada en el enunciado del reto.
  host: "mudb.learn.mulesoft.com"
  port: "3306"
  # Usuario y contraseña van cifrados; la llave se entrega por runtime con mule.key.
